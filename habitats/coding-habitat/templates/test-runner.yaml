# ─── Test Runner ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-test-runner
  labels:
    {{- include "coding-habitat.labels" . | nindent 4 }}
    swarm.raphael.ai/agent-type: test-runner
    swarm.raphael.ai/role: validator
spec:
  replicas: {{ .Values.testRunner.replicas }}
  selector:
    matchLabels:
      {{- include "coding-habitat.selectorLabels" . | nindent 6 }}
      swarm.raphael.ai/agent-type: test-runner
  template:
    metadata:
      labels:
        {{- include "coding-habitat.selectorLabels" . | nindent 8 }}
        swarm.raphael.ai/agent-type: test-runner
        swarm.raphael.ai/role: validator
    spec:
      containers:
        - name: test-runner
          image: "{{ .Values.testRunner.image.repository }}:{{ .Values.testRunner.image.tag }}"
          imagePullPolicy: {{ .Values.testRunner.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AGENT_ROLE
              value: "validator"
            - name: HABITAT_NAME
              value: {{ .Values.habitat.name }}
            - name: PLANNER_HOST
              value: "{{ .Release.Name }}-planner"
            - name: REPO_SERVICE_HOST
              value: "{{ .Release.Name }}-repo-service"
          resources:
            {{- toYaml .Values.testRunner.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-test-runner
  labels:
    {{- include "coding-habitat.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "coding-habitat.selectorLabels" . | nindent 4 }}
    swarm.raphael.ai/agent-type: test-runner
