# ─── Coding Agents ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-coding-agent
  labels:
    {{- include "coding-habitat.labels" . | nindent 4 }}
    swarm.raphael.ai/agent-type: coding-agent
    swarm.raphael.ai/role: worker
spec:
  replicas: {{ .Values.codingAgent.replicas }}
  selector:
    matchLabels:
      {{- include "coding-habitat.selectorLabels" . | nindent 6 }}
      swarm.raphael.ai/agent-type: coding-agent
  template:
    metadata:
      labels:
        {{- include "coding-habitat.selectorLabels" . | nindent 8 }}
        swarm.raphael.ai/agent-type: coding-agent
        swarm.raphael.ai/role: worker
    spec:
      containers:
        - name: coding-agent
          image: "{{ .Values.codingAgent.image.repository }}:{{ .Values.codingAgent.image.tag }}"
          imagePullPolicy: {{ .Values.codingAgent.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AGENT_ROLE
              value: "worker"
            - name: HABITAT_NAME
              value: {{ .Values.habitat.name }}
            - name: PLANNER_HOST
              value: "{{ .Release.Name }}-planner"
            - name: REPO_SERVICE_HOST
              value: "{{ .Release.Name }}-repo-service"
            - name: REPO_SERVICE_PORT
              value: "{{ .Values.repoService.port }}"
          resources:
            {{- toYaml .Values.codingAgent.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-coding-agent
  labels:
    {{- include "coding-habitat.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "coding-habitat.selectorLabels" . | nindent 4 }}
    swarm.raphael.ai/agent-type: coding-agent
