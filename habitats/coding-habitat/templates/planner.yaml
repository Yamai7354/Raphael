# ─── Planner Agent ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-planner
  labels:
    {{- include "coding-habitat.labels" . | nindent 4 }}
    swarm.raphael.ai/agent-type: planner
    swarm.raphael.ai/role: coordinator
spec:
  replicas: {{ .Values.planner.replicas }}
  selector:
    matchLabels:
      {{- include "coding-habitat.selectorLabels" . | nindent 6 }}
      swarm.raphael.ai/agent-type: planner
  template:
    metadata:
      labels:
        {{- include "coding-habitat.selectorLabels" . | nindent 8 }}
        swarm.raphael.ai/agent-type: planner
        swarm.raphael.ai/role: coordinator
    spec:
      containers:
        - name: planner
          image: "{{ .Values.planner.image.repository }}:{{ .Values.planner.image.tag }}"
          imagePullPolicy: {{ .Values.planner.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AGENT_ROLE
              value: "coordinator"
            - name: HABITAT_NAME
              value: {{ .Values.habitat.name }}
            - name: REPO_SERVICE_HOST
              value: "{{ .Release.Name }}-repo-service"
            - name: VECTOR_MEMORY_HOST
              value: "{{ .Release.Name }}-vector-memory"
          resources:
            {{- toYaml .Values.planner.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-planner
  labels:
    {{- include "coding-habitat.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "coding-habitat.selectorLabels" . | nindent 4 }}
    swarm.raphael.ai/agent-type: planner
