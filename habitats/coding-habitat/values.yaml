# Coding Habitat values
habitat:
  name: coding-habitat
  ttlSeconds: 7200

planner:
  replicas: 1
  image:
    repository: raphael-registry:5111/planner-agent
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

codingAgent:
  replicas: 4
  image:
    repository: raphael-registry:5111/coding-agent
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

testRunner:
  replicas: 1
  image:
    repository: raphael-registry:5111/test-runner
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

repoService:
  enabled: true
  image:
    repository: raphael-registry:5111/repo-service
    tag: latest
    pullPolicy: IfNotPresent
  storage: 2Gi
  port: 8090
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

vectorMemory:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: latest
    pullPolicy: IfNotPresent
  storage: 1Gi
  port: 6333
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

serviceDiscovery:
  enabled: true
